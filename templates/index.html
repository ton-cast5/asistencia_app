<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AttendCore — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;
  --surface:#0e1420;
  --surface2:#141c2e;
  --border:#1e2d45;
  --border2:#243347;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --accent-glow:rgba(59,130,246,.35);
  --green:#22c55e;
  --red:#ef4444;
  --text:#e2e8f0;
  --muted:#64748b;
  --muted2:#94a3b8;
  --radius:14px;
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── FONDO ANIMADO ── */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
  pointer-events:none;
}
@keyframes gridMove{from{background-position:0 0}to{background-position:40px 40px}}

.bg-glow{
  position:fixed;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.12) 0%,transparent 65%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}
  50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}
}

/* ── CARD ── */
.card{
  position:relative;
  width:100%;max-width:400px;
  margin:0 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 32px;
  box-shadow:0 0 0 1px rgba(59,130,246,.08),0 25px 60px rgba(0,0,0,.5);
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── LOGO ── */
.logo{
  display:flex;align-items:center;gap:12px;
  margin-bottom:32px;
}
.logo-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px rgba(59,130,246,.4);
}
.logo-text{font-size:22px;font-weight:700;letter-spacing:-.4px}
.logo-text span{color:var(--accent2)}
.badge{
  margin-left:auto;
  font-family:var(--mono);font-size:10px;
  background:rgba(59,130,246,.12);
  border:1px solid rgba(59,130,246,.25);
  color:var(--accent2);
  padding:3px 8px;border-radius:6px;
  letter-spacing:.5px;
}

.title{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.subtitle{font-size:14px;color:var(--muted2);margin-bottom:28px}

/* ── TABS ── */
.tabs{
  display:flex;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  margin-bottom:24px;
  gap:4px;
}
.tab{
  flex:1;
  padding:9px;
  border:none;background:transparent;
  color:var(--muted2);
  font-family:var(--font);font-size:13px;font-weight:600;
  border-radius:7px;
  cursor:pointer;
  transition:all .2s ease;
}
.tab.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 0 12px rgba(59,130,246,.4);
}

/* ── INPUTS ── */
.field{position:relative;margin-bottom:16px}
.field label{
  display:block;
  font-size:12px;font-weight:600;
  color:var(--muted2);
  letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:8px;
}
.field input{
  width:100%;
  padding:13px 16px 13px 44px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:var(--font);font-size:15px;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.field input::placeholder{color:var(--muted)}
.field .icon{
  position:absolute;left:14px;bottom:14px;
  font-size:16px;color:var(--muted);pointer-events:none;
}
.field .eye{
  position:absolute;right:14px;bottom:14px;
  font-size:16px;color:var(--muted);
  cursor:pointer;
  background:none;border:none;padding:0;
  transition:color .2s;
}
.field .eye:hover{color:var(--accent2)}

.field input.error{border-color:var(--red) !important}
.field-err{
  font-size:12px;color:var(--red);
  margin-top:5px;display:none;
  gap:4px;align-items:center;
}
.field-err.show{display:flex}

/* ── BTN ── */
.btn-primary{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border:none;border-radius:var(--radius);
  color:#fff;font-family:var(--font);font-size:16px;font-weight:700;
  cursor:pointer;
  margin-top:8px;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(59,130,246,.35);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(59,130,246,.5)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary.loading{pointer-events:none;opacity:.8}
.btn-primary .spinner{
  display:none;
  width:20px;height:20px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-primary.loading .btn-text{display:none}
.btn-primary.loading .spinner{display:block}

.link-row{
  text-align:center;
  margin-top:20px;
  font-size:13px;color:var(--muted2);
}
.link-row a{
  color:var(--accent2);text-decoration:none;font-weight:600;
  transition:color .2s;
}
.link-row a:hover{color:var(--text)}

/* ── ALERT ── */
.alert{
  display:none;
  padding:12px 14px;
  border-radius:10px;
  font-size:13px;font-weight:500;
  margin-bottom:16px;
  gap:8px;align-items:flex-start;
}
.alert.show{display:flex}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.alert.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}

/* ── DEVICE BADGE ── */
.device-info{
  display:flex;align-items:center;gap:8px;
  background:rgba(34,197,94,.06);
  border:1px solid rgba(34,197,94,.18);
  border-radius:10px;
  padding:10px 14px;
  margin-bottom:20px;
  font-size:12px;color:#86efac;
}
.device-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  flex-shrink:0;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:420px){
  .card{margin:0 12px;padding:32px 20px}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div class="logo-text">Attend<span>Core</span></div>
    <div class="badge">v2.0</div>
  </div>

  <h1 class="title">Bienvenido</h1>
  <p class="subtitle">Accede a tu cuenta para continuar</p>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('alumno')">🎓 Alumno</button>
    <button class="tab" onclick="setTab('profesor')">👨‍🏫 Profesor</button>
  </div>

  <!-- DEVICE -->
  <div class="device-info">
    <div class="device-dot"></div>
    <span id="deviceText">Detectando dispositivo…</span>
  </div>

  <!-- ALERT -->
  <div class="alert error" id="alertMsg">
    <span>⚠️</span><span id="alertText"></span>
  </div>

  <!-- FORM -->
  <div class="field">
    <label>Correo institucional</label>
    <span class="icon">✉️</span>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" inputmode="email">
  </div>

  <div class="field">
    <label>Contraseña</label>
    <span class="icon">🔒</span>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="eye" onclick="togglePwd()" id="eyeBtn">👁️</button>
  </div>

  <button class="btn-primary" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">Iniciar sesión</span>
    <div class="spinner"></div>
  </button>

  <div class="link-row">
    ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────
const API = '';  // mismo dominio en Vercel
let currentTab = 'alumno';

// ── DEVICE ID ─────────────────────────────────
function getDeviceId() {
  let id = localStorage.getItem('device_id');
  if (!id) {
    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('device_id', id);
  }
  return id;
}

const deviceId = getDeviceId();
document.getElementById('deviceText').textContent = `Dispositivo: ${deviceId.slice(0,18)}…`;

// ── TABS ─────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='alumno') || (i===1 && tab==='profesor'));
  });
}

// ── TOGGLE PASSWORD ───────────────────────────
function togglePwd() {
  const input = document.getElementById('password');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  document.getElementById('eyeBtn').textContent = show ? '🙈' : '👁️';
}

// ── ALERT ─────────────────────────────────────
function showAlert(msg) {
  const el = document.getElementById('alertMsg');
  document.getElementById('alertText').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

// ── LOGIN ─────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showAlert('Por favor completa todos los campos');
    return;
  }

  btn.classList.add('loading');

  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, telefono_id: deviceId })
    });

    const data = await res.json();

    if (data.success) {
      // Guardar sesión
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('token', data.token);
      localStorage.setItem('telefono_id', deviceId);

      // Vibración de éxito
      if (navigator.vibrate) navigator.vibrate([50, 30, 80]);

      // Redirigir según rol
      if (data.user.rol === 'profesor') {
        window.location.href = '/dashboard_profesor';
      } else {
        window.location.href = '/dashboard_alumno';
      }
    } else {
      showAlert(data.message || 'Error al iniciar sesión');
    }
  } catch (e) {
    showAlert('Error de conexión. Intenta de nuevo.');
  } finally {
    btn.classList.remove('loading');
  }
}

// ── ENTER KEY ─────────────────────────────────
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// ── AUTO-SESSION ──────────────────────────────
(async () => {
  const savedUser = localStorage.getItem('user');
  const savedDeviceId = localStorage.getItem('telefono_id');
  
  if (savedUser && savedDeviceId === deviceId) {
    const user = JSON.parse(savedUser);
    // Verificar sesión activa
    try {
      const res = await fetch(`${API}/api/verify-session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telefono_id: deviceId })
      });
      const data = await res.json();
      if (data.valid) {
        window.location.href = data.user.rol === 'profesor'
          ? '/dashboard_profesor'
          : '/dashboard_alumno';
      }
    } catch(e) {/* continuar al login */}
  }
})();
</script>
</body>
</html>
